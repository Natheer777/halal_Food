paths:
  /products:
    post:
      tags:
        - Products
      summary: Create a new product
      operationId: createProduct
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Subcategory not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    get:
      tags:
        - Products
      summary: List all products
      operationId: getAllProducts
      responses:
        "200":
          description: List of products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/visible:
    get:
      tags:
        - Products
      summary: Get visible products with pagination
      operationId: getVisibleProducts
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of items per page
      responses:
        "200":
          description: Paginated list of visible products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProductsResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{id}:
    get:
      tags:
        - Products
      summary: Get product by ID
      operationId: getProductById
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the product
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      tags:
        - Products
      summary: Update a product
      operationId: updateProduct
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the product
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Product updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationErrorResponse"
        "404":
          description: Product or Subcategory not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      tags:
        - Products
      summary: Delete a product
      operationId: deleteProduct
      parameters:
        - in: path
          name: id
          required: true
          description: ID of the product
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Product deleted successfully
        "404":
          description: Product not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/subcategory/{subcategoryId}:
    get:
      tags:
        - Products
      summary: Get products by subcategory ID
      operationId: getProductsBySubcategory
      parameters:
        - in: path
          name: subcategoryId
          required: true
          description: ID of the subcategory
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: List of products in the subcategory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductsListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

components:
  schemas:
    PaginatedProductsResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: object
          properties:
            products:
              type: array
              items:
                $ref: "#/components/schemas/Product"
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            totalPages:
              type: integer
    ProductStatus:
      type: string
      enum: [visible, hidden]
    
    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        subcategoryName:
          type: string
        manufacturingLocation:
          type: string
        availableQuantity:
          type: integer
        price:
          type: number
        size:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        images:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - subcategoryName
        - manufacturingLocation
        - availableQuantity
        - price
        - size
        - status
        - images
        - createdAt

    CreateProductRequest:
      type: object
      properties:
        name:
          type: string
        subcategoryName:
          type: string
        manufacturingLocation:
          type: string
        availableQuantity:
          type: integer
        price:
          type: number
        size:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        images:
          type: array
          items:
            type: string
            format: binary
          maxItems: 10
      required:
        - name
        - subcategoryName
        - manufacturingLocation
        - availableQuantity
        - price
        - size
        - status

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        subcategoryName:
          type: string
        manufacturingLocation:
          type: string
        availableQuantity:
          type: integer
        price:
          type: number
        size:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/ProductStatus"
        images:
          type: array
          items:
            type: string
            format: binary
          maxItems: 10

    ProductResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          $ref: "#/components/schemas/Product"
      required:
        - status
        - data

    ProductsListResponse:
      type: object
      properties:
        status:
          type: string
          example: success
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
      required:
        - status
        - data

    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: failed
        message:
          type: string
      required:
        - status
        - message

    ValidationErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: failed
        message:
          type: string
        errors:
          type: array
          items:
            type: object
            properties:
              msg:
                type: string
              param:
                type: string
              location:
                type: string
      required:
        - status
        - message
