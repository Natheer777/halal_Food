openapi: 3.0.3
info:
  title: HalaFood API
  version: 1.0.0
  description: HalaFood backend API documentation.

servers:
  - url: http://localhost:3000/api
    description: API base path
  - url: https://halal-food.onrender.com/api
    description: development server

tags:
  - name: Categories
    description: Main categories and subcategories
  - name: Products
    description: Product management
  - name: Offers
    description: Special offers and discounts

paths:
  /main-categories:
    $ref: "./swagger-categories.yaml#/paths/~1main-categories"
  '/main-categories/{id}':
    $ref: "./swagger-categories.yaml#/paths/~1main-categories~1{id}"
  '/main-categories/{mainCategoryId}/subcategories':
    $ref: "./swagger-categories.yaml#/paths/~1main-categories~1{mainCategoryId}~1subcategories"
  '/main-categories/{mainCategoryId}/subcategories/{subcategoryId}':
    $ref: "./swagger-categories.yaml#/paths/~1main-categories~1{mainCategoryId}~1subcategories~1{subcategoryId}"
  '/subcategories/{subcategoryId}':
    $ref: "./swagger-categories.yaml#/paths/~1subcategories~1{subcategoryId}"
  /products:
    $ref: "./swagger-products.yaml#/paths/~1products"
  '/products/{id}':
    $ref: "./swagger-products.yaml#/paths/~1products~1{id}"
  /products/visible:
    $ref: "./swagger-products.yaml#/paths/~1products~1visible"
  /subcategories:
    $ref: "./swagger-categories.yaml#/paths/~1subcategories"
  /offers:
    $ref: "./swagger-offers.yaml#/paths/~1offers"
  '/offers/product/{productId}':
    $ref: "./swagger-offers.yaml#/paths/~1offers~1product~1{productId}"
  /offers/active:
    $ref: "./swagger-offers.yaml#/paths/~1offers~1active"
  '/offers/{id}':
    $ref: "./swagger-offers.yaml#/paths/~1offers~1{id}"

components:
  schemas:
    # Categories Schemas
    MainCategory:
      $ref: "./swagger-categories.yaml#/components/schemas/MainCategory"
    Subcategory:
      $ref: "./swagger-categories.yaml#/components/schemas/Subcategory"
    MainCategoryWithSubcategories:
      $ref: "./swagger-categories.yaml#/components/schemas/MainCategoryWithSubcategories"
    CreateSubcategoryRequest:
      $ref: "./swagger-categories.yaml#/components/schemas/CreateSubcategoryRequest"
    ErrorResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/ErrorResponse"
    ValidationErrorResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/ValidationErrorResponse"
    MainCategoryResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/MainCategoryResponse"
    PaginatedMainCategoriesResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/PaginatedMainCategoriesResponse"
    SubcategoryResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/SubcategoryResponse"
    PaginatedSubcategoriesResponse:
      $ref: "./swagger-categories.yaml#/components/schemas/PaginatedSubcategoriesResponse"
    
    # Products Schemas
    ProductStatus:
      $ref: "./swagger-products.yaml#/components/schemas/ProductStatus"
    Product:
      $ref: "./swagger-products.yaml#/components/schemas/Product"
    CreateProductRequest:
      $ref: "./swagger-products.yaml#/components/schemas/CreateProductRequest"
    UpdateProductRequest:
      $ref: "./swagger-products.yaml#/components/schemas/UpdateProductRequest"
    ProductResponse:
      $ref: "./swagger-products.yaml#/components/schemas/ProductResponse"
    ProductsListResponse:
      $ref: "./swagger-products.yaml#/components/schemas/ProductsListResponse"
    PaginatedProductsResponse:
      $ref: "./swagger-products.yaml#/components/schemas/PaginatedProductsResponse"

    # Offers Schemas
    Offer:
      $ref: "./swagger-offers.yaml#/components/schemas/Offer"
    CreateOfferRequest:
      $ref: "./swagger-offers.yaml#/components/schemas/CreateOfferRequest"
    OfferResponse:
      $ref: "./swagger-offers.yaml#/components/schemas/OfferResponse"
    OffersResponse:
      $ref: "./swagger-offers.yaml#/components/schemas/OffersResponse"
    ActiveOffersResponse:
      $ref: "./swagger-offers.yaml#/components/schemas/ActiveOffersResponse"